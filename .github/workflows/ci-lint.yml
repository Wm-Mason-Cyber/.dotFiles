name: CI - lint & pre-commit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js (for ajv)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install ajv-cli
        run: npm install -g ajv-cli

      - name: Validate docs/manifest.json against schema
        run: |
          ajv validate -s .github/schemas/manifest.schema.json -d docs/manifest.json

  precommit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Configure git identity for CI
        run: |
          git config user.email "ci@example.com"
          git config user.name "CI Runner"

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run Precommit on all files
        env:
          # Prevent git from trying to prompt for HTTPS credentials via stdin
          # (stdin is /dev/null in CI; prompting causes ENXIO / "No such device")
          GIT_TERMINAL_PROMPT: "0"
        run: pre-commit run --all-files
