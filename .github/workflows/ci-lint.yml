name: CI - lint & pre-commit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js (for ajv)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install ajv-cli
        run: npm install -g ajv-cli

      - name: Validate docs/manifest.json against schema
        run: |
          ajv validate -s .github/schemas/manifest.schema.json -d docs/manifest.json

  precommit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system tools (shellcheck + make)
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck make python3-yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Configure git identity for CI
        run: |
          git config user.email "ci@example.com"
          git config user.name "CI Runner"

      - name: Run pre-commit on all files
        run: pre-commit run --all-files
