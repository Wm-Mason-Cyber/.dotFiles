name: Prompt check

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prompt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity for CI
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Runner"

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y bash git

      - name: Make tests executable
        run: chmod +x tests/*.sh

      - name: Validate .bashrc helpers and prompt
        # verify_prompt.sh sets BASH_TESTING=1 internally, bypassing the
        # [[ $- != *i* ]] guard that would otherwise cause sourcing to no-op
        # in a non-interactive CI shell.
        run: ./tests/verify_prompt.sh

      - name: Live git_branch and git_dirty test
        run: |
          set -euo pipefail
          REPO="$GITHUB_WORKSPACE"
          tmpdir=$(mktemp -d)
          cd "$tmpdir"
          git init -q
          git config user.email "ci@example.com"
          git config user.name "CI Runner"
          echo hello > a.txt
          git add a.txt
          git commit -m init -q

          # BASH_TESTING=1 bypasses the interactive-shell guard in .bashrc.
          # Use absolute path to avoid fragile relative path assumptions.
          branch=$(BASH_TESTING=1 bash -c "source '${REPO}/.bashrc' >/dev/null 2>&1; git_branch")
          [ -n "$branch" ] || { echo "git_branch returned empty" >&2; exit 2; }
          echo "git_branch OK: $branch"

          echo change >> a.txt
          dirty=$(BASH_TESTING=1 bash -c "source '${REPO}/.bashrc' >/dev/null 2>&1; git_dirty")
          [ -n "$dirty" ] || { echo "git_dirty returned empty on modified repo" >&2; exit 2; }
          echo "git_dirty OK: $dirty"

      - name: Run package list check
        run: bash ./standard-apps.sh list
